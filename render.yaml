services:
  - type: web
    name: apontamentto-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # Cole a URL do Neon aqui (postgresql+asyncpg://...)
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ALLOWED_ORIGINS
        sync: false  # Ex: https://apontamentto.vercel.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
