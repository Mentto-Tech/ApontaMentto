services:
  - type: web
    name: apontamentto-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # Cole a URL do Neon aqui (postgresql+asyncpg://...)
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ALLOWED_ORIGINS
        sync: false  # Ex: https://apontamentto.vercel.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optional: reverse-geocoding / IP geolocation (for logs address display)
      - key: GEOCODER_USER_AGENT
        sync: false  # Ex: ApontaMentto/1.0 (contato@seudominio.com)
      - key: GEOCODER_CONTACT_EMAIL
        sync: false  # Usado para compor o User-Agent se GEOCODER_USER_AGENT não for definido
      - key: NOMINATIM_BASE_URL
        sync: false  # Default: https://nominatim.openstreetmap.org
      - key: IP_GEO_BASE_URL
        sync: false  # Default: https://ipwho.is
      - key: GEOCODER_CACHE_TTL_SECONDS
        sync: false  # Default: 604800 (7 dias)
      - key: GEOCODER_NEGATIVE_CACHE_TTL_SECONDS
        sync: false  # Default: 300 (5 min) para falhas/rate-limit
